services:
  projectrag-api:
    build:
      context: .
    container_name: projectrag-api
    env_file:
      - .env
    environment:
      POSTGRES_HOST: projectrag-postgres
      GRAPHDB_URL: http://projectrag-graphdb:7200
    ports:
      - "${APP_PORT:-8001}:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      projectrag-postgres:
        condition: service_healthy
      projectrag-graphdb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  projectrag-postgres:
    image: pgvector/pgvector:pg16
    container_name: projectrag-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  projectrag-graphdb:
    image: ontotext/graphdb:10.8.6
    container_name: projectrag-graphdb
    env_file:
      - .env
    ports:
      - "7200:7200"
    volumes:
      - graphdb_data:/opt/graphdb/home
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:7200/rest/repositories >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  postgres_data:
  graphdb_data:
