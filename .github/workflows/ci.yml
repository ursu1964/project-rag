name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest -v

      - name: Run lint
        run: python -m compileall -q app scripts tests

      - name: Run import validation
        run: |
          python - <<'PY'
          import app.main
          import app.workflows.rag_workflow
          import app.workflows.cognitive_workflow
          print("imports ok")
          PY

      - name: Validate OpenAPI contract snapshot
        run: python -m scripts.export_openapi_snapshot --check

      - name: Validate docker-compose.yml
        run: docker compose config

      - name: Validate Docker image digest pins
        run: python -m scripts.check_docker_image_pins --require-digest

  frontend:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Verify frontend
        working-directory: frontend
        run: npm run verify

  security:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Secret scan
        run: python -m scripts.scan_secrets

      - name: Python dependency vulnerability scan
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit==2.9.0
          pip-audit -r requirements.txt --strict

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend dependency vulnerability scan
        working-directory: frontend
        run: npm audit --audit-level=high --omit=dev

  e2e-smoke:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start API and frontend stack
        run: docker compose up -d --build api frontend

      - name: Run e2e smoke checks
        run: python -m scripts.e2e_smoke

      - name: Show compose logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=200

      - name: Stop stack
        if: always()
        run: docker compose down -v

  retry-backoff-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    continue-on-error: ${{ matrix.experimental }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.12"
            experimental: false
          - python-version: "3.13"
            experimental: true

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: projectrag
          POSTGRES_USER: projectrag
          POSTGRES_PASSWORD: projectrag-ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U projectrag -d projectrag"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      POSTGRES_DB: projectrag
      POSTGRES_USER: projectrag
      POSTGRES_PASSWORD: projectrag-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply migrations
        run: alembic upgrade head

      - name: Retry backoff smoke verification
        run: python -m scripts.verify_retry_backoff
