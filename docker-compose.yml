services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: projectrag-api
    environment:
      APP_ENV: local
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: projectrag
      POSTGRES_USER: projectrag
      POSTGRES_PASSWORD: projectrag_password
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      GRAPHDB_URL: http://graphdb:7200
      OLLAMA_URL: ${CONTAINER_OLLAMA_URL:-http://host.docker.internal:11434}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
    ports:
      - "${APP_PORT:-8001}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
      graphdb:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: projectrag-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8001
    ports:
      - "3000:3000"
    depends_on:
      - api

  postgres:
    image: pgvector/pgvector:pg16
    container_name: projectrag-postgres
    environment:
      POSTGRES_DB: projectrag
      POSTGRES_USER: projectrag
      POSTGRES_PASSWORD: projectrag_password
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U projectrag -d projectrag"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: projectrag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: projectrag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  graphdb:
    image: ontotext/graphdb:10.8.6
    container_name: projectrag-graphdb
    ports:
      - "7200:7200"
    volumes:
      - graphdb_data:/opt/graphdb/home

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    container_name: projectrag-otel-collector
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./deploy/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "4318:4318"
      - "8889:8889"

  blackbox:
    image: prom/blackbox-exporter:v0.25.0
    container_name: projectrag-blackbox
    command: ["--config.file=/etc/blackbox/blackbox.yml"]
    volumes:
      - ./deploy/monitoring/blackbox/blackbox.yml:/etc/blackbox/blackbox.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9115:9115"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: projectrag-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./deploy/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9091}:9090"
    depends_on:
      - api
      - blackbox
      - alertmanager

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: projectrag-alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ${ALERTMANAGER_CONFIG_PATH:-./deploy/monitoring/alertmanager/alertmanager.yml}:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "${ALERTMANAGER_PORT:-9094}:9093"

  grafana:
    image: grafana/grafana:11.1.4
    container_name: projectrag-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  graphdb_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:
