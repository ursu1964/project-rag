apiVersion: apps/v1
kind: Deployment
metadata:
  name: projectrag-frontend
spec:
  replicas: 2
  selector:
    matchLabels: { app: projectrag-frontend }
  template:
    metadata:
      labels: { app: projectrag-frontend }
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: frontend
          image: projectrag-frontend:0.1.0
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 3000 }]
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: /api
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: projectrag-frontend
spec:
  selector: { app: projectrag-frontend }
  ports:
    - port: 3000
      targetPort: 3000
