apiVersion: apps/v1
kind: Deployment
metadata:
  name: projectrag-frontend
spec:
  replicas: 2
  selector:
    matchLabels: { app: projectrag-frontend }
  template:
    metadata:
      labels: { app: projectrag-frontend }
    spec:
      containers:
        - name: frontend
          image: projectrag-frontend:latest
          ports: [{ containerPort: 3000 }]
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: /api
---
apiVersion: v1
kind: Service
metadata:
  name: projectrag-frontend
spec:
  selector: { app: projectrag-frontend }
  ports:
    - port: 3000
      targetPort: 3000
