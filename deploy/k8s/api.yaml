apiVersion: apps/v1
kind: Deployment
metadata:
  name: projectrag-api
spec:
  replicas: 2
  selector:
    matchLabels: { app: projectrag-api }
  template:
    metadata:
      labels: { app: projectrag-api }
    spec:
      containers:
        - name: api
          image: projectrag-api:latest
          ports: [{ containerPort: 8000 }]
          envFrom:
            - secretRef: { name: projectrag-secrets }
            - configMapRef: { name: projectrag-config }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
          livenessProbe:
            httpGet: { path: /health/live, port: 8000 }
---
apiVersion: v1
kind: Service
metadata:
  name: projectrag-api
spec:
  selector: { app: projectrag-api }
  ports:
    - port: 8000
      targetPort: 8000
