apiVersion: apps/v1
kind: Deployment
metadata:
  name: projectrag-api
spec:
  replicas: 2
  selector:
    matchLabels: { app: projectrag-api }
  template:
    metadata:
      labels: { app: projectrag-api }
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: api
          image: projectrag-api:0.1.0
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8000 }]
          envFrom:
            - secretRef: { name: projectrag-secrets }
            - configMapRef: { name: projectrag-config }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { cpu: "1000m", memory: "1Gi" }
          readinessProbe:
            httpGet: { path: /health/ready, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /health/live, port: 8000 }
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: projectrag-api
spec:
  selector: { app: projectrag-api }
  ports:
    - port: 8000
      targetPort: 8000
